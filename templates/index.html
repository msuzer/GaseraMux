<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gasera Pneumatic Multiplexer Controller</title>

  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/bootstrap-icons.css') }}" rel="stylesheet">
  <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/chart.js') }}"></script>
  <script src="{{ url_for('static', filename='js/chartjs-plugin-zoom.min.js') }}"></script>
  <link href="{{ url_for('static', filename='css/status.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/channels.css') }}" rel="stylesheet">
  <script src="{{ url_for('static', filename='js/api_routes.js') }}"></script>
</head>

<body class="container-fluid py-3">
  <div class="row justify-content-center mb-4">
    <div class="col-12 col-lg-8">
      <div class="d-flex align-items-center justify-content-between px-3 px-md-4">
        <h2 class="m-0">Gasera Multiplexer Controller</h2>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/core_index.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/version_tab.js') }}" defer></script>

  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">

          <!-- Nav tabs -->
          <ul class="nav nav-tabs justify-content-center mb-3" id="uiTabs" role="tablist">
            <li class="nav-item" role="presentation">
              <button class="nav-link active" id="home-tab" data-bs-toggle="tab" data-bs-target="#home" type="button"
                role="tab" aria-controls="home" aria-selected="true">
                Home
              </button>
            </li>

            <li class="nav-item" role="presentation">
              <button class="nav-link" id="results-tab" data-bs-toggle="tab" data-bs-target="#results" type="button"
                role="tab" aria-controls="results" aria-selected="false">
                Results
              </button>
            </li>

            <li class="nav-item" role="presentation">
              <button class="nav-link" id="version-tab" data-bs-toggle="tab" data-bs-target="#tab-version" type="button"
                role="tab" aria-controls="tab-version" aria-selected="false">
                Version
              </button>
            </li>
          </ul>

          <!-- Tab panes -->
          <div class="tab-content" id="uiTabsContent">
            <div class="tab-pane fade show active" id="home" role="tabpanel" aria-labelledby="home-tab">
              {% include "partials/home_tab.html" %}
            </div>

            <div class="tab-pane fade" id="results" role="tabpanel" aria-labelledby="results-tab">
              {% include "partials/results_tab.html" %}
            </div>

            <div class="tab-pane fade" id="tab-version" role="tabpanel" aria-labelledby="version-tab">
              {% include "partials/version_tab.html" %}
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <footer class="status-footer-wrapper mt-3">
    <div class="container-fluid p-3">
      <div
        class="status-footer py-2 px-3 d-flex flex-wrap justify-content-between align-items-center text-muted small rounded shadow-sm">
        <div>
          <i class="bi bi-wifi me-1" id="connIcon"></i>
          <span id="connStatus">Gasera Offline</span>
        </div>
        <div>
          <i class="bi bi-clock-history me-1"></i>
          <span>Last Update:</span>
          <span id="lastUpdate">–</span>
        </div>
      </div>
    </div>
  </footer>

</body>

</html>
